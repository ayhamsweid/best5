server {
  listen 80;
  server_name _;
  server_tokens off;
  client_max_body_size 6m;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_proxied any;
  gzip_types
    application/javascript
    application/json
    application/ld+json
    application/xml
    image/svg+xml
    text/css
    text/plain
    text/xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com; frame-src https://www.google.com https://maps.google.com https://www.google.com.tr https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com" always;

  root /usr/share/nginx/html;
  index index.html;

  location ^~ /assets/ {
    try_files $uri =404;
    expires 1y;
  }

  location /api/ {
    proxy_pass http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://api:4000/uploads/;
    proxy_set_header Host $host;
    proxy_hide_header Cache-Control;
    expires 30d;
  }

  location = /sitemap.xml {
    proxy_pass http://api:4000/sitemap.xml;
    proxy_set_header Host $host;
  }

  location = / {
    proxy_pass http://renderer:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /admin {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri /index.html;
  }

  location ~ ^/(ar|en)/preview(/|$) {
    try_files $uri /index.html;
  }

  location ~ ^/(ar|en)(/|$) {
    proxy_pass http://renderer:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri @seo_fallback;
  }

  location @seo_fallback {
    proxy_pass http://renderer:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
